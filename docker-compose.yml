version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-hotel_db}
      POSTGRES_USER: ${DB_USER:-hotel_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-hotel_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-hotel_user} -d ${DB_NAME:-hotel_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    command: bash -c "python manage.py migrate && gunicorn --bind 0.0.0.0:8000 --workers 2 --max-requests 1000 --timeout 60 config.wsgi:application"
    env_file:
      - ./backend/.env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-http://localhost}
      DB_NAME: ${DB_NAME:-hotel_db}
      DB_USER: ${DB_USER:-hotel_user}
      DB_PASSWORD: ${DB_PASSWORD:-hotel_dev_password}
      DB_HOST: db
      DB_PORT: 5432
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data: