version: '3.8'

services:
  backend:
    build: ./backend
    restart: unless-stopped
    command: bash -c "python manage.py migrate && python manage.py collectstatic --noinput --clear && gunicorn --bind 0.0.0.0:8000 config.wsgi:application"
    env_file:
      - ./.env
    environment:
      DJANGO_SETTINGS_MODULE: ${DJANGO_SETTINGS_MODULE:-config.settings}
    expose:
      - "8000"
    volumes:
      - django_static:/app/staticfiles 

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-webroot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - django_static:/app/staticfiles 
    depends_on:
      - backend

volumes:
  certbot-webroot:
  django_static:  